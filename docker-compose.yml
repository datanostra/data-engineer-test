services:
  db:
    image: postgres:16-alpine
    container_name: foodvisor_postgres
    environment:
      POSTGRES_DB: foodvisor
      POSTGRES_USER: foodvisor
      POSTGRES_PASSWORD: foodvisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodvisor -d foodvisor"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    container_name: foodvisor_ads_api
    working_dir: /app
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_NAME: foodvisor
      DB_USER: foodvisor
      DB_PASSWORD: foodvisor
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data: